<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula 04 - Exercício 2: Card de Certificado</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="card-header">
          <p>Certificado da Palestra</p>
        </div>

        <div class="card-body">
          <h2>Dupla Diplomacia - Engenharia Química e Elétrica</h2>

          <div class="info-grid">
            <div>
              <span class="label">DIA</span>
              <span>quinta</span>
            </div>
            <div>
              <span class="label">INÍCIO</span>
              <span>08:00</span>
            </div>
            <div>
              <span class="label">PALESTRANTE</span>
              <span>Henri Eberspacher</span>
            </div>
          </div>
        </div>

        <div class="card-footer">
          <div class="badge">
            <span>🎖️</span>
          </div>
          <a href="#" class="download-button">Download</a>
        </div>
      </div>
    </div>
  </body>
</html>
