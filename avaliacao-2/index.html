<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="index.js"></script>
    <title>Prova RA2 e RA3</title>
</head>
<body>
    <h2>Cadastro</h2>
    <form id="form-cadastro">
        <input type="text" name="nome" id="nome" placeholder="Nome do Produto">
        <input type="text" name="descricao" id="descricao" placeholder="Descrição do Produto">
        <input type="number" name="preco" id="preco" placeholder="Preço do Produto">
        <button type="button" onclick="cadastrar()">Cadastrar</button>
    </form>

    <br>
    <hr>

    <h2>Tabela</h2>

    <br>

    <div id="resultado">
        <table id="tabela">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome do Produto</th>
                    <th>Descrição</th>
                    <th>Preço</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo">

            </tbody>
        </table>
    </div>
</body>
</html>
